<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lola Bar CCMQ</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Nunito",sans-serif; background:#fdf0f0; min-height:100vh; color:#2a1010; }

/* LOGIN SCREEN */
#login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; background:#fdf0f0; }
#login-screen img { height:160px; width:auto; margin-bottom:1.5rem; background:transparent; mix-blend-mode:multiply; }
.login-card { background:#fff; border-radius:24px; padding:2rem 1.5rem; width:100%; max-width:340px; border:1.5px solid #f0d8d8; }
.login-card h2 { font-size:16px; font-weight:800; color:#8b1a1a; margin-bottom:0.3rem; text-align:center; }
.login-card p { font-size:12px; color:#b08080; text-align:center; margin-bottom:1.5rem; }
.form-row { display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }
.form-row label { font-size:11px; font-weight:700; color:#b08080; letter-spacing:0.1em; text-transform:uppercase; }
.form-row input { border:1.5px solid #f0d8d8; border-radius:10px; padding:12px; font-family:"Nunito",sans-serif; font-size:14px; color:#2a1010; background:#fdf8f8; outline:none; width:100%; }
.form-row input:focus { border-color:#8b1a1a; }
.login-submit { background:#8b1a1a; color:#fff; border:none; border-radius:12px; padding:13px; font-family:"Nunito",sans-serif; font-weight:800; font-size:15px; cursor:pointer; width:100%; margin-top:4px; }
.login-submit:active { opacity:0.85; }
.login-error { color:#c03030; font-size:12px; text-align:center; margin-top:10px; display:none; font-weight:700; }
.login-loading { color:#b08080; font-size:12px; text-align:center; margin-top:10px; display:none; }

/* HEADER */
.header { background:#fff; border-bottom:2.5px solid #8b1a1a; padding:0.85rem 1.5rem; display:flex; align-items:center; justify-content:space-between; }
.header img { height:120px; width:auto; }
.header-right { display:flex; align-items:center; gap:10px; }
.user-chip { background:#fde8e8; color:#8b1a1a; border-radius:999px; padding:5px 12px; font-size:12px; font-weight:800; }
.logout-btn { background:none; border:1.5px solid #f0d8d8; color:#b08080; border-radius:8px; padding:5px 10px; font-family:"Nunito",sans-serif; font-size:11px; font-weight:700; cursor:pointer; }
.admin-btn { background:none; border:none; cursor:pointer; font-size:20px; opacity:0.25; padding:4px; }
.admin-btn:hover { opacity:0.6; }

/* PORTAL */
#portal-screen { display:none; }
#portal { padding:1.25rem 1rem 3rem; }
.section-label { font-size:11px; font-weight:800; letter-spacing:0.18em; text-transform:uppercase; color:#c08080; margin:1.5rem 0.25rem 0.75rem; }
.section-label:first-child { margin-top:0; }
.card { display:flex; align-items:center; gap:1rem; background:#fff; border-radius:20px; padding:0.9rem 1rem; margin-bottom:10px; text-decoration:none; color:inherit; border:1.5px solid #f0e0dc; transition:transform 0.13s,box-shadow 0.13s; }
.card:hover { transform:scale(1.01); box-shadow:0 4px 16px rgba(139,26,26,0.1); }
.card:active { transform:scale(0.98); }
.card.disabled { opacity:0.4; pointer-events:none; }
.icon-wrap { width:52px; height:52px; min-width:52px; border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:26px; line-height:1; background:#fde8e8; }
.card-info { flex:1; min-width:0; }
.card-name { font-size:14px; font-weight:800; color:#1a0a0a; line-height:1.2; }
.card-desc { font-size:11.5px; color:#b08080; font-weight:600; margin-top:2px; }
.badge-soon { background:#f5f0ee; color:#c0a098; border:1px solid #e8d8d4; font-size:9px; padding:3px 8px; border-radius:999px; font-weight:800; text-transform:uppercase; }
.divider { height:1px; background:#f0e4e0; margin:0.5rem 0; }
footer { text-align:center; margin-top:2.5rem; font-size:10px; color:#d8b8b8; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; }

/* ADMIN */
#admin-screen { display:none; padding:1.25rem 1rem 3rem; }
.admin-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.5rem; }
.admin-header h2 { font-size:18px; font-weight:800; color:#8b1a1a; }
.back-btn { background:#fde8e8; border:none; color:#8b1a1a; border-radius:10px; padding:6px 14px; font-family:"Nunito",sans-serif; font-weight:700; font-size:13px; cursor:pointer; }
.admin-section { background:#fff; border-radius:20px; border:1.5px solid #f0d8d8; padding:1.2rem; margin-bottom:1rem; }
.admin-section h3 { font-size:12px; font-weight:800; letter-spacing:0.15em; text-transform:uppercase; color:#c08080; margin-bottom:1rem; }
.form-row-a { display:flex; flex-direction:column; gap:6px; margin-bottom:10px; }
.form-row-a label { font-size:11px; font-weight:700; color:#b08080; letter-spacing:0.1em; text-transform:uppercase; }
.form-row-a input, .form-row-a select { border:1.5px solid #f0d8d8; border-radius:10px; padding:10px 12px; font-family:"Nunito",sans-serif; font-size:13px; color:#2a1010; background:#fdf8f8; outline:none; width:100%; }
.form-row-a input:focus { border-color:#8b1a1a; }
.add-btn { background:#8b1a1a; color:#fff; border:none; border-radius:12px; padding:12px; font-family:"Nunito",sans-serif; font-weight:800; font-size:14px; cursor:pointer; width:100%; margin-top:4px; }
.item-list { display:flex; flex-direction:column; gap:8px; }
.item-row { display:flex; align-items:center; gap:10px; background:#fdf8f8; border-radius:12px; padding:10px 12px; border:1.5px solid #f0d8d8; }
.item-emoji { font-size:20px; min-width:28px; }
.item-info { flex:1; min-width:0; }
.item-name { font-size:13px; font-weight:700; color:#2a1010; }
.item-cat { font-size:10px; color:#c08080; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
.delete-btn { background:#fde8e8; border:none; color:#8b1a1a; border-radius:8px; padding:6px 10px; font-size:12px; cursor:pointer; font-weight:700; }
.admin-tabs { display:flex; gap:8px; margin-bottom:1rem; }
.tab-btn { flex:1; padding:10px; border-radius:12px; border:1.5px solid #f0d8d8; background:#fdf8f8; font-family:"Nunito",sans-serif; font-weight:700; font-size:13px; color:#b08080; cursor:pointer; }
.tab-btn.active { background:#8b1a1a; color:#fff; border-color:#8b1a1a; }
</style>
</head>

let currentUser = null;

async function apiCall(body) {
  const res = await fetch(FUNC_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", "apikey": ANON_KEY, "Authorization": "Bearer " + ANON_KEY },
    body: JSON.stringify(body)
  });
  return res.json();
}

async function doLogin() {
  const name = document.getElementById("login-name").value.trim();
  const pwd = document.getElementById("login-pwd").value;
  if (!name || !pwd) { showError("Preencha nome e senha"); return; }
  document.getElementById("login-error").style.display = "none";
  document.getElementById("login-loading").style.display = "block";
  document.querySelector(".login-submit").disabled = true;
  try {
    const res = await apiCall({ action: "login", name, password: pwd });
    if (res.success) {
      currentUser = res.user;
      sessionStorage.setItem("lola_user", JSON.stringify(res.user));
      showPortalScreen();
    } else {
      showError(res.message || "Nome ou senha incorretos");
    }
  } catch(e) {
    showError("Erro de conexão. Tente novamente.");
  }
  document.getElementById("login-loading").style.display = "none";
  document.querySelector(".login-submit").disabled = false;
}

function showError(msg) {
  const el = document.getElementById("login-error");
  el.textContent = msg;
  el.style.display = "block";
}

function doLogout() {
  currentUser = null;
  sessionStorage.removeItem("lola_user");
  document.getElementById("portal-screen").style.display = "none";
  document.getElementById("admin-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
  document.getElementById("login-name").value = "";
  document.getElementById("login-pwd").value = "";
}

function showPortalScreen() {
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("admin-screen").style.display = "none";
  document.getElementById("portal-screen").style.display = "block";
  document.getElementById("user-chip").textContent = "👤 " + currentUser.name;
  if (currentUser.role === "admin") {
    document.getElementById("admin-gear").style.display = "block";
  }
  renderPortal();
}

function showPortal() {
  document.getElementById("admin-screen").style.display = "none";
  document.getElementById("portal-screen").style.display = "block";
}

function showAdmin() {
  document.getElementById("portal-screen").style.display = "none";
  document.getElementById("admin-screen").style.display = "block";
  document.getElementById("user-chip-admin").textContent = "👤 " + currentUser.name;
  renderAdminItems();
  loadUsers();
}

function getData() {
  try { const s = localStorage.getItem("lola_portal"); return s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_DATA)); }
  catch(e) { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}
function saveData(d) { localStorage.setItem("lola_portal", JSON.stringify(d)); }

function renderPortal() {
  const data = getData();
  const el = document.getElementById("portal");
  let html = ""; let first = true;
  for (const [sec, items] of Object.entries(data)) {
    if (!items || items.length === 0) continue;
    if (!first) html += "<div class=\"divider\"></div>";
    html += "<p class=\"section-label\">" + sec + "</p>";
    for (const item of items) {
      if (item.disabled) {
        html += "<div class=\"card disabled\"><div class=\"icon-wrap\">" + item.emoji + "</div><div class=\"card-info\"><p class=\"card-name\">" + item.name + "</p><p class=\"card-desc\">" + item.desc + "</p></div><span class=\"badge-soon\">Em breve</span></div>";
      } else {
        html += "<a href=\"" + item.link + "\" target=\"_blank\" class=\"card\"><div class=\"icon-wrap\">" + item.emoji + "</div><div class=\"card-info\"><p class=\"card-name\">" + item.name + "</p><p class=\"card-desc\">" + item.desc + "</p></div><span style=\"color:#ddb8b8;font-size:20px;\">›</span></a>";
      }
    }
    first = false;
  }
  html += "<footer>Lola Bar CCMQ · Uso interno</footer>";
  el.innerHTML = html;
}

  const data = getData();

    });
  }
  list.innerHTML = html || "<p style=\"color:#c08080;font-size:13px;text-align:center;\">Nenhum botão</p>";
}

function addItem() {
  const emoji = document.getElementById("new-emoji").value.trim() || "📎";
  const name = document.getElementById("new-name").value.trim();
  const desc = document.getElementById("new-desc").value.trim();
  const link = document.getElementById("new-link").value.trim();
  const cat = document.getElementById("new-cat").value;
  if (!name || !link) { alert("Preencha nome e link!"); return; }
  const data = getData();
  if (!data[cat]) data[cat] = [];
  data[cat].push({emoji, name, desc, link});
  saveData(data); renderAdminItems(); renderPortal();
  document.getElementById("new-emoji").value = "";
  document.getElementById("new-name").value = "";
  document.getElementById("new-desc").value = "";
  document.getElementById("new-link").value = "";
  alert("Botão \"" + name + "\" adicionado!");
}

function deleteItem(sec, idx) {
  if (!confirm("Remover este botão?")) return;
  const data = getData();
  data[sec].splice(idx, 1);
  saveData(data); renderAdminItems(); renderPortal();
}

async function loadUsers() {
  const res = await apiCall({ action: "list_users" });
  const list = document.getElementById("user-list");
  if (!res.success) { list.innerHTML = "<p style=\"color:#c08080;font-size:13px;\">Erro ao carregar</p>"; return; }
  let html = "";
  res.users.forEach(u => {
    const isAdmin = u.role === "admin";
    html += "<div class=\"item-row\"><div class=\"item-emoji\">" + (isAdmin ? "⭐" : "👤") + "</div><div class=\"item-info\"><div class=\"item-name\">" + u.name + "</div><div class=\"item-cat\">" + (isAdmin ? "Admin" : "Usuário") + "</div></div>" + (!isAdmin ? "<button class=\"delete-btn\" onclick=\"deleteUser('" + u.id + "')\">Remover</button>" : "") + "</div>";
  });
  list.innerHTML = html || "<p style=\"color:#c08080;font-size:13px;text-align:center;\">Nenhum usuário</p>";
}

async function addUser() {
  const name = document.getElementById("new-user-name").value.trim();
  const pwd = document.getElementById("new-user-pwd").value;
  if (!name || !pwd) { alert("Preencha nome e senha!"); return; }
  const res = await apiCall({ action: "add_user", newName: name, newPassword: pwd });
  if (res.success) {
    document.getElementById("new-user-name").value = "";
    document.getElementById("new-user-pwd").value = "";
    loadUsers();
    alert("Usuário \"" + name + "\" adicionado!");
  } else { alert("Erro: " + res.message); }
}

async function deleteUser(id) {
  if (!confirm("Remover este usuário?")) return;
  const res = await apiCall({ action: "delete_user", userId: id });
  if (res.success) loadUsers();
  else alert("Erro: " + res.message);
}

function switchTab(tab) {
  document.getElementById("tab-botoes").style.display = tab === "botoes" ? "block" : "none";
  document.getElementById("tab-usuarios").style.display = tab === "usuarios" ? "block" : "none";
  document.querySelectorAll(".tab-btn").forEach((btn, i) => {
    btn.classList.toggle("active", (i === 0 && tab === "botoes") || (i === 1 && tab === "usuarios"));
  });
  if (tab === "usuarios") loadUsers();
}

document.getElementById("login-pwd").addEventListener("keydown", function(e) {
  if (e.key === "Enter") doLogin();
});

// Verificar sessão salva
const saved = sessionStorage.getItem("lola_user");
if (saved) { currentUser = JSON.parse(saved); showPortalScreen(); }
</script>
